<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <radialGradient id="planetGradient" cx="50%" cy="50%" r="50%" fx="40%" fy="40%">
      <stop offset="0%" stop-color="#A8D8EA" />
      <stop offset="30%" stop-color="#5F9EA0" />
      <stop offset="100%" stop-color="#006994" />
    </radialGradient>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE4B5" />
      <stop offset="100%" stop-color="#FFD700" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#1a1a1a" />

  <!-- Planet -->
  <circle cx="50" cy="50" r="35" fill="url(#planetGradient)" />

  <!-- Orbital Ring (Third Horizon) -->
  <ellipse cx="50" cy="50" rx="42" ry="12" stroke="url(#orbGradient)" stroke-width="3" fill="none" transform="rotate(-25 50 50)" />
  <ellipse cx="50" cy="50" rx="42" ry="12" stroke="url(#orbGradient)" stroke-width="3" fill="none" stroke-dasharray="6 4" transform="rotate(65 50 50)" opacity="0.7" />
  <ellipse cx="50" cy="50" rx="42" ry="12" stroke="url(#orbGradient)" stroke-width="3" fill="none" stroke-dasharray="2 6" transform="rotate(-75 50 50)" opacity="0.5" />
</svg>
